# =============================================================================
# AequorOS risk service — PRODUCTION compose (Coolify: Base Directory /backend,
# Docker Compose Location /docker-compose.prod.yml).
#
# Production grade rules enforced here:
#   · NO bundled database or object store — production uses the managed
#     Postgres (DATABASE_URL) and the existing MinIO/S3 (S3_*). The bundled
#     risk-postgres/risk-minio in docker-compose.yml are LOCAL DEV ONLY.
#   · NO credentials in this file, and NO variable interpolation either: every
#     service loads `env_file: .env` — the file the platform (Coolify) writes
#     from its Environment Variables UI into the project directory. SHARP EDGE
#     (learned 2026-07-21): Coolify PARSES compose files — including comments —
#     and auto-seeds a UI env row for every dollar-brace variable reference it
#     finds; with required-with-message guards it even stored the message text
#     as the value, and its duplicate handling re-injected junk rows on every
#     deploy. Referencing no variables gives the parser nothing to seed. Do
#     not reintroduce dollar-brace interpolation in this file, even in comments.
#   · Fail-fast moved to the app layer: the backend refuses to start on missing
#     critical config (empty DATABASE_URL → settings validator raises in
#     risk-migrate; unset AUTH_JWT_SECRET → auth fails closed), so a bad value
#     still stops the deploy at the migrate step.
#
# Coolify domains: attach api.aequoros.com to risk-api ONLY (container port
# 8000). risk-migrate and risk-worker get no domain.
# =============================================================================

services:
  # One-shot: bring the managed database schema to head before api/worker start.
  risk-migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    env_file:
      - .env

  risk-api:
    build: .
    restart: unless-stopped
    depends_on:
      risk-migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health/live', timeout=4).status==200 else 1)\""]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 20s
    env_file:
      - .env
    environment:
      # Literal pin (overrides env_file): workers run as a separate service;
      # never in-process in prod.
      RUN_INPROCESS_WORKER: "0"

  risk-worker:
    build: .
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    # Long handlers (etl_dedup runs >15 min): give SIGTERM time to finish the
    # in-flight job before the reaper/retry machinery has to clean up.
    stop_grace_period: 120s
    depends_on:
      risk-migrate:
        condition: service_completed_successfully
    env_file:
      - .env
