# Bloomberg field catalog (market_data_adapter.md §6.2).
#
# Ground truth for what the Bloomberg adapter will pull: the bank sees
# "Ghana yield curve" in the UI; the adapter pulls exactly the securities and
# field mnemonics listed here. Every DataScope in the taxonomy has an entry so
# coverage is explicit and complete.
#
# THREE enablement states:
#   supported: true                       -> live-offered; catalog carries the
#                                            verified securities + fields.
#   supported: false, verification_required: true
#                                         -> the STRUCTURE is fully specified in
#                                            the `verification:` block (tenors,
#                                            fields, quota, and the exact vendor
#                                            doc to consult), but the concrete
#                                            Bloomberg security identifiers are
#                                            NOT yet confirmed. No mnemonic is
#                                            invented (§16.4): enabling the scope
#                                            is a DATA update (fill the verified
#                                            securities into a supported entry,
#                                            set quota, flip the flag) — never a
#                                            code change, because the adapter
#                                            already dispatches every scope
#                                            category. Security-master persistence
#                                            is the one exception (needs a
#                                            canonical entity — see its note).
#
# The `field` mnemonics that ARE named below (PX_LAST, RTG_* issuer-rating
# codes) are the same vendor-agnostic-per-issuer fields already confirmed in the
# supported entries; only the per-scope SECURITY tickers require verification.
#
# This catalog is versioned with the adapter. When Bloomberg deprecates a
# security or introduces a better data source, update here; downstream canonical
# records remain unchanged in shape.

# --- Supported: verified against spec §6.2 -----------------------------------

YIELD_CURVE_GHS:
  data_source: BVAL
  fields:
    - security: "GHGGB1M Index"
      field: "PX_LAST"
      tenor_months: 1
    - security: "GHGGB3M Index"
      field: "PX_LAST"
      tenor_months: 3
    - security: "GHGGB6M Index"
      field: "PX_LAST"
      tenor_months: 6
    - security: "GHGGB12M Index"
      field: "PX_LAST"
      tenor_months: 12
    - security: "GHGGB2Y Index"
      field: "PX_LAST"
      tenor_months: 24
    - security: "GHGGB5Y Index"
      field: "PX_LAST"
      tenor_months: 60
    - security: "GHGGB10Y Index"
      field: "PX_LAST"
      tenor_months: 120
  quota_units_per_pull: 7
  supported: true

FX_SPOT_USD_GHS:
  security: "USDGHS Curncy"
  field: "PX_LAST"
  quota_units_per_pull: 1
  supported: true

CREDIT_RATING_GHANA_SOVEREIGN:
  security: "GHANA Govt"
  fields:
    - "RTG_MDY_LT_LC_ISSUER_CREDIT"
    - "RTG_SP_LT_LC_ISSUER_CREDIT"
    - "RTG_FITCH_LT_LC_ISSUER_CREDIT"
  quota_units_per_pull: 3
  supported: true

# --- Verification required: structure complete, securities unconfirmed --------

