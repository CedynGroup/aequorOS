      Confirm the U.S. Treasury constant-maturity generic-yield securities in
      Bloomberg GOVY <GO> / FLDS <GO> (the USGG<tenor> Index family, e.g.
      "USGG10YR Index") and the PX_LAST field before enabling.
    data_source: BVAL
    field: "PX_LAST"
    tenor_months: [1, 3, 6, 12, 24, 36, 60, 84, 120]
    quota_units_per_pull: 9

