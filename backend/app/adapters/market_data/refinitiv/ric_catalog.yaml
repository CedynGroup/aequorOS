# Refinitiv (LSEG) RIC catalog (market_data_adapter.md §7.2).
#
# Maps DataScope values to Refinitiv Instrument Codes (RICs) and data field
# references. This catalog is ground truth for what the adapter pulls: the
# bank sees "Ghana yield curve" in the UI; the adapter pulls whatever is
# documented here. Every DataScope in the taxonomy has an entry.
#
# THREE enablement states:
#   supported: true                       -> live-offered; catalog carries the
#                                            verified RICs + fields.
#   supported: false, verification_required: true
#                                         -> the STRUCTURE is fully specified in
#                                            the `verification:` block (tenors,
#                                            fields, quota, and the exact vendor
#                                            doc to consult), but the concrete
#                                            RICs are NOT yet confirmed. No RIC is
#                                            invented (§16.4): enabling a scope is
#                                            a DATA update (fill the verified RICs
#                                            into a supported entry, set quota,
#                                            flip the flag) — never a code change,
#                                            because the adapter already
#                                            dispatches every scope category.
#                                            Security master is the one exception
#                                            (needs a canonical entity — see its
#                                            note).
#
# The `field` references named below (TR.MidYield, TR.MidPrice, the
# TR.*IssuerRating codes) are the same fields already confirmed in the supported
# entries; only the per-scope RICs require verification.
#
# Note: the spec catalog for the GHS curve intentionally omits the 36- and
# 84-month standard tenors (§5.2); the supported entry preserves that exactly.

# --- Supported: verified against spec §7.2 -----------------------------------

YIELD_CURVE_GHS:
  rics:
    - ric: "GH1M="
      field: "TR.MidYield"
      tenor_months: 1
    - ric: "GH3M="
      field: "TR.MidYield"
      tenor_months: 3
    - ric: "GH6M="
      field: "TR.MidYield"
      tenor_months: 6
    - ric: "GH1Y="
      field: "TR.MidYield"
      tenor_months: 12
    - ric: "GH2Y="
      field: "TR.MidYield"
      tenor_months: 24
    - ric: "GH5Y="
      field: "TR.MidYield"
      tenor_months: 60
    - ric: "GH10Y="
      field: "TR.MidYield"
      tenor_months: 120
  quota_units_per_pull: 7
  supported: true

FX_SPOT_USD_GHS:
  ric: "USDGHS=R"
  field: "TR.MidPrice"
  quota_units_per_pull: 1
  supported: true

CREDIT_RATING_GHANA_SOVEREIGN:
  ric: "GH="
  fields:
    - "TR.MoodysIssuerRating"
    - "TR.SPIssuerRating"
    - "TR.FitchIssuerRating"
  quota_units_per_pull: 3
  supported: true

# --- Verification required: structure complete, RICs unconfirmed --------------

YIELD_CURVE_USD:
  supported: false
  verification_required: true
  verification:
    doc: >-
      Confirm the U.S. Treasury constant-maturity benchmark RICs in the LSEG
      Data Platform (Search / Yield Curve app, e.g. the US<tenor>YT=RR chain)
      and the TR.MidYield field before enabling.
    field: "TR.MidYield"
    tenor_months: [1, 3, 6, 12, 24, 36, 60, 84, 120]
    quota_units_per_pull: 9

