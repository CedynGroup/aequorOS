SECURITY_MASTER_GOG_BONDS:
  supported: false
  verification_required: true
  verification:
    # Canonical persistence for security master also requires a canonical
    # reference entity + a MarketDataBundle slot (see needsIntegration); this
    # scope stays code-blocked, not only data-blocked, until that lands.
    doc: >-
      Confirm the Government of Ghana bond universe RICs and the LSEG reference
      field for each attribute (identifiers, issuer, maturity, coupon,
      day-count, callable) before enabling.
    attributes: [isin, cusip, issuer, maturity, coupon, day_count, callable]

SECURITY_MASTER_GOG_TBILLS:
  supported: false
  verification_required: true
  verification:
    # Requires the security-master canonical entity (see needsIntegration).
    doc: >-
      Confirm the Government of Ghana Treasury-bill universe RICs and the LSEG
      reference fields for each attribute before enabling.
    attributes: [isin, cusip, issuer, maturity, discount_rate, day_count]

CREDIT_RATING_NIGERIA_SOVEREIGN:
  supported: false
  verification_required: true
  verification:
    # The rating field references are the same confirmed issuer-rating fields as
    # CREDIT_RATING_GHANA_SOVEREIGN; only the issuer RIC needs confirming.
    doc: >-
      Confirm the Nigeria sovereign issuer RIC in the LSEG Data Platform (the
      "NG=" convention, matching Ghana's "GH=") before enabling.
    fields:
      - "TR.MoodysIssuerRating"
      - "TR.SPIssuerRating"
      - "TR.FitchIssuerRating"
    quota_units_per_pull: 3

