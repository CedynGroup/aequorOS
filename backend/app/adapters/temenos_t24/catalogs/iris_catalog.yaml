# Temenos T24 — IRIS REST connection-mode catalog.
#
# Derived from the OFS catalog: identical canonical output, REST source
# field names (camelCase, a documented Temenos convention) and IRIS provider
# endpoints. Endpoint + field names are DEFAULTS overridable per bank via
# connection catalog_overrides — the IRIS JSON schema is installation-specific.
# A domain stays supported:false until its IRIS field schema is confirmed.

GL_BALANCES:
  supported: true
  endpoint: iris/v1/general-ledger/balances
  id_field: glCode
  selection:
    coCode: '{company}'
  page_size: 1000
  field_map:
    glCode: account_code
    description: name
    category: account_class
    currency: currency
    lcyBalance: balance
  attribute_keys:
  - balance_ghs
  lcy_fields:
    balance_ghs: lcyBalance
  enum_mappings:
    account_class:
      ASSET: ASSET
      LIABILITY: LIABILITY
      EQUITY: EQUITY
      INCOME: INCOME
      EXPENSE: EXPENSE
      CONTINGENT: OFF_BALANCE
POSITIONS_LOANS:
  supported: true
  endpoint: iris/v1/arrangements/lending
  id_field: arrangementId
  selection:
    arrProductLine: LENDING
    coCode: '{company}'
  page_size: 500
  field_map:
    arrangementId: source_reference
    customer: counterparty_reference
    product: product_code
    currency: currency
    amount: balance
    startDate: origination_date
    maturityDate: contractual_maturity
    nextRepriceDate: next_repricing_date
    interestRate: interest_rate
    intType: rate_type
    indexRate: rate_index
    marginRate: rate_spread
    ifrs9Stage: ifrs9_stage
    coCode: branch_id
    arrStatus: arrears_status
  attribute_keys:
  - balance_ghs
  - ecl_provision_ghs
  - branch_id
  - arrears_status
  lcy_fields:
    balance_ghs: lcyAmount
    ecl_provision_ghs: lcyProvisionAmt
  enum_mappings:
    rate_type:
      F: FIXED
      V: FLOATING
      FIXED: FIXED
      FLOATING: FLOATING
    ifrs9_stage:
      '1': '1'
      '2': '2'
      '3': '3'
      STAGE1: '1'
      STAGE2: '2'
      STAGE3: '3'
  constants:
    position_type: LOAN
POSITIONS_DEPOSITS:
  supported: true
  endpoint: iris/v1/arrangements/deposits
  id_field: arrangementId
