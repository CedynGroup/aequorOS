COUNTERPARTY_MASTER:
  supported: true
  endpoint: iris/v1/parties/customers
  id_field: customerCode
  selection:
    coCode: '{company}'
  page_size: 1000
  field_map:
    customerCode: source_reference
    name1: name
    sector: counterparty_type
    country: country_code
    lCuRating: rating
    target: group_reference
    coCode: branch_id
    industry: industry_code
  attribute_keys:
  - branch_id
  - industry_code
  enum_mappings:
    counterparty_type:
      '1000': RETAIL_INDIVIDUAL
      '1001': RETAIL_INDIVIDUAL
      '2000': SME
      '3000': CORPORATE
      '4000': BANK_OECD
      '4100': BANK_NON_OECD
      '5000': CENTRAL_BANK
      '6000': SOVEREIGN
      '6100': GOVERNMENT_ENTITY
      '7000': NBFI
