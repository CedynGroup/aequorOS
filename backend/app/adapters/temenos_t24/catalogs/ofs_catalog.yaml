# Temenos T24 — OFS connection-mode catalog.
#
# Maps each CoreBankingDomain to its OFS request coordinates (T24 application +
# ENQUIRY.SELECT enquiry) and to the canonical output schema the OFS extractors
# emit. `field_map` renames raw T24 fields to canonical keys; `attribute_keys`
# marks canonical keys copied into the position/account `attributes` payload
# (and each MUST be sourced from a field_map target, an lcy_field, or a
# constant); `lcy_fields` binds a canonical attribute to the T24 local-currency-
# equivalent field; `enum_mappings`/`constants` finish canonicalization.
#
# HONESTY RAILS:
#   * A domain without `supported: true` is NOT offered (never fake support).
#   * Enquiry names below are AequorOS-convention DEFAULTS. T24 enquiries are
#     installation-specific — a bank overrides them via connection
#     `catalog_overrides` without a code change. The loader validates structure,
#     not that a given enquiry exists in a particular core.
#   * Application/field names stay within documented, standard T24 vocabulary
#     (KNOWN_TABLES in adapter.py); nothing here invents a T24 endpoint.

# ---------------------------------------------------------------------------
# Priority domains — the pilotable core (supported now).
# ---------------------------------------------------------------------------

GL_BALANCES:
  supported: true
  application: GENERAL.LEDGER
  enquiry: AEQ.NOFILE.GL.BALANCES
  id_field: GL.CODE
  page_size: 1000
  selection:
    CO.CODE: "{company}"
  field_map:
    GL.CODE: account_code
    DESCRIPTION: name
    CATEGORY: account_class
    CURRENCY: currency
    LCY.BALANCE: balance
  attribute_keys:
    - balance_ghs
  lcy_fields:
    balance_ghs: LCY.BALANCE
  enum_mappings:
    account_class:
      ASSET: ASSET
      LIABILITY: LIABILITY
      EQUITY: EQUITY
      INCOME: INCOME
      EXPENSE: EXPENSE
      CONTINGENT: OFF_BALANCE
  constants: {}

POSITIONS_LOANS:
  supported: true
  application: AA.ARRANGEMENT
  enquiry: AEQ.AA.LENDING.POSITIONS
  id_field: ARRANGEMENT.ID
  page_size: 500
  selection:
    ARR.PRODUCT.LINE: LENDING
    CO.CODE: "{company}"
  field_map:
    ARRANGEMENT.ID: source_reference
    CUSTOMER: counterparty_reference
    PRODUCT: product_code
    CURRENCY: currency
    AMOUNT: balance
    START.DATE: origination_date
    MATURITY.DATE: contractual_maturity
    NEXT.REPRICE.DATE: next_repricing_date
    INTEREST.RATE: interest_rate
    INT.TYPE: rate_type
    INDEX.RATE: rate_index
    MARGIN.RATE: rate_spread
    IFRS9.STAGE: ifrs9_stage
    CO.CODE: branch_id
    ARR.STATUS: arrears_status
  attribute_keys:
    - balance_ghs
    - ecl_provision_ghs
    - branch_id
    - arrears_status
  lcy_fields:
    balance_ghs: LCY.AMOUNT
    ecl_provision_ghs: LCY.PROVISION.AMT
  enum_mappings:
    rate_type:
      F: FIXED
      V: FLOATING
      FIXED: FIXED
      FLOATING: FLOATING
    ifrs9_stage:
      "1": "1"
      "2": "2"
      "3": "3"
      STAGE1: "1"
      STAGE2: "2"
      STAGE3: "3"
  constants:
    position_type: LOAN

