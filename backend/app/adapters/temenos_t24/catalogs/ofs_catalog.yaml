# FX deal semantics match fact_derivation's hedge reader: `currency` is the
# SOLD (short) leg, `buy_currency` the bought leg (defaults GHS when absent),
# `contract_rate` converts the sell notional to the buy leg, `mtm_ghs` is the
# LCY mark-to-market. `hedge_id`/`instrument` are optional grouping/vocab.
POSITIONS_FX_DEALS:
  supported: true
  application: FOREX
  enquiry: AEQ.FOREX.DEALS
  id_field: FX.ID
  selection:
    CO.CODE: "{company}"
  field_map:
    COUNTERPARTY: counterparty_reference
    CURRENCY.SOLD: currency
    AMOUNT.SOLD: balance
    VALUE.DATE.FWD: contractual_maturity
    CURRENCY.BOUGHT: buy_currency
    DEAL.RATE: contract_rate
    DEAL.TYPE: instrument
    HEDGE.REF: hedge_id
  attribute_keys:
    - notional_ghs
    - buy_currency
    - contract_rate
    - instrument
    - hedge_id
    - mtm_ghs
  lcy_fields:
    notional_ghs: LCY.AMOUNT.SOLD
    mtm_ghs: LCY.MTM
  constants:
    position_type: FX_HEDGE

# IRS semantics match fact_derivation's swap reader: `direction` is
# pay_fixed|receive_fixed (lowercased), `pay_rate_pct` the fixed leg, and
# `receive_index` the floating index whose name encodes the reset tenor.
POSITIONS_SWAPS:
  supported: true
  application: SWAP.AGREEMENT
  enquiry: AEQ.SWAP.IRS
  id_field: SWAP.ID
  selection:
    CO.CODE: "{company}"
  field_map:
    SWAP.ID: swap_id
    COUNTERPARTY: counterparty_reference
    CURRENCY: currency
    PRINCIPAL: balance
    START.DATE: origination_date
    MATURITY.DATE: contractual_maturity
    PAY.RECEIVE.TYPE: direction
    PAY.RATE: pay_rate_pct
    RECEIVE.INDEX: receive_index
    TENOR.YEARS: tenor_years
  attribute_keys:
    - notional_ghs
    - swap_id
    - direction
    - pay_rate_pct
    - receive_index
    - tenor_years
  lcy_fields:
    notional_ghs: LCY.PRINCIPAL
  constants:
    position_type: INTEREST_RATE_SWAP

SECURITIES_HOLDINGS:
  supported: true
