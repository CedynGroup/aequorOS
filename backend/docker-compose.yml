services:
  risk-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: risk_service
    ports:
      - "15432:5432"
    volumes:
      - risk-postgres-data:/var/lib/postgresql/data

  risk-minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - risk-minio-data:/data

  risk-minio-init:
    image: minio/mc
    depends_on:
      - risk-minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://risk-minio:9000 minioadmin minioadmin &&
      mc mb -p local/risk-local || true &&
      mc anonymous set none local/risk-local
      "

  # The live-engine background worker: same image and env as the API, but its
  # command is the poll loop instead of the HTTP server. Runs one worker; scale
  # with `docker compose up --scale risk-worker=N` (claims use SKIP LOCKED).
  risk-worker:
    build: .
    command: ["python", "-m", "app.worker"]
    depends_on:
      - risk-postgres
      - risk-minio
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://postgres:postgres@risk-postgres:5432/risk_service
      RISK_S3_ENDPOINT_URL: http://risk-minio:9000
      RISK_S3_BUCKET: risk-local
      RISK_S3_ACCESS_KEY_ID: minioadmin
      RISK_S3_SECRET_ACCESS_KEY: minioadmin
      WORKER_POLL_SECONDS: "2.0"
      OFFICIAL_RUN_ENABLED: "false"

volumes:
  risk-postgres-data:
  risk-minio-data:
