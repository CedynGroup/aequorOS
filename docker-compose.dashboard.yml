# =============================================================================
# AequorOS client dashboard — production deploy wrapper (Coolify).
#
# Why compose instead of the raw Dockerfile build pack: this is a pnpm
# WORKSPACE build that needs the REPO ROOT as its docker context, and Coolify's
# compose build pack is the one that reliably stages the full repository
# (the Dockerfile build pack shipped a ~1KB context → every COPY failed).
#
# COOLIFY SETTINGS for the dashboard app:
#   • Build Pack:              Docker Compose
#   • Base Directory:          /                     (repo root)
#   • Docker Compose Location: /docker-compose.dashboard.yml
#   • Domain:                  https://app.aequoros.com → service `dashboard`
#                              (container port 3000)
#   • Env vars: NEXT_PUBLIC_* are BUILD-time (inlined into the client bundle;
#     Coolify passes UI env vars as --build-arg for compose builds) and MUST
#     stay interpolated — build args cannot come from env_file. Runtime vars
#     (AUTH_SECRET, AUTH_URL, SSO_INTERNAL_KEY) load via env_file: .env, the
#     file Coolify writes from its UI — no runtime interpolation, so the
#     compose parser has only the three build args to seed. Never put message
#     text in guards: Coolify stores guard text as seeded variable VALUES
#     (the 2026-07-21 backend incident).
# =============================================================================

services:
  dashboard:
    build:
      context: .
      dockerfile: backend/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_RISK_API_BASE_URL: ${NEXT_PUBLIC_RISK_API_BASE_URL:?}
        NEXT_PUBLIC_LOGIN_URL: ${NEXT_PUBLIC_LOGIN_URL:?}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 15s
    env_file:
      - .env
    environment:
      AUTH_TRUST_HOST: "true"
