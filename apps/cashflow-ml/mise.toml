[tools]
python = "3.13"
uv = "latest"

[tasks."cashflow-ml:sync"]
description = "Install dependencies with uv"
run = "uv sync"

[tasks."cashflow-ml:dev"]
description = "Run FastAPI dev server"
run = '''
#!/usr/bin/env bash
uv run fastapi dev app/main.py --host "${HOST:-127.0.0.1}" --port "${PORT:-8010}"
'''

[tasks."cashflow-ml:train"]
description = "Train the LSTM on the full synthetic series and save artifacts"
run = "uv run python -c 'from app.model import train_and_save; print(train_and_save())'"

[tasks."cashflow-ml:test"]
description = "Run pytest (fast model config)"
env = { CASHFLOW_FAST_TEST = "1" }
run = "uv run pytest"

[tasks."cashflow-ml:lint"]
description = "Run Ruff checks"
run = "uv run ruff check ."

[tasks."cashflow-ml:format"]
description = "Format Python files with Ruff"
run = [
  "uv run ruff format .",
  "uv run ruff check . --fix",
]

[tasks."cashflow-ml:typecheck"]
description = "Run BasedPyright"
run = "uv run basedpyright"

[tasks."cashflow-ml:check"]
description = "Run lint, typecheck, and tests"
depends = ["cashflow-ml:lint", "cashflow-ml:typecheck", "cashflow-ml:test"]
