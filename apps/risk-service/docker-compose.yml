services:
  risk-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: risk_service
    ports:
      - "15432:5432"
    volumes:
      - risk-postgres-data:/var/lib/postgresql/data

  risk-minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - risk-minio-data:/data

  risk-minio-init:
    image: minio/mc
    depends_on:
      - risk-minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://risk-minio:9000 minioadmin minioadmin &&
      mc mb -p local/risk-local || true &&
      mc anonymous set none local/risk-local
      "

volumes:
  risk-postgres-data:
  risk-minio-data:
