[tools]
node = "24"
pnpm = "11.2.2"

[tasks."risk-service:sync"]
description = "Install risk service dependencies with uv"
dir = "apps/risk-service"
run = "mise run risk-service:sync"

[tasks."risk-service:hooks"]
description = "Install risk service pre-commit, commit-msg, and pre-push hooks"
dir = "apps/risk-service"
run = "mise run risk-service:hooks"

[tasks."risk-service:precommit"]
description = "Run risk service pre-commit hooks against all files"
dir = "apps/risk-service"
run = "mise run risk-service:precommit"

[tasks."risk-service:dev"]
description = "Run risk service FastAPI dev server"
dir = "apps/risk-service"
run = "mise run risk-service:dev"

[tasks."risk-service:test"]
description = "Run risk service pytest"
dir = "apps/risk-service"
run = "mise run risk-service:test"

[tasks."risk-service:test-postgres"]
description = "Run risk service pytest against local Docker Postgres"
dir = "apps/risk-service"
run = "mise run risk-service:test-postgres"

[tasks."risk-service:test-postgres-migrations"]
description = "Run risk service Postgres-backed Alembic migration tests"
dir = "apps/risk-service"
run = "mise run risk-service:test-postgres-migrations"

[tasks."risk-service:lint"]
description = "Run risk service Ruff checks"
dir = "apps/risk-service"
run = "mise run risk-service:lint"

[tasks."risk-service:format"]
description = "Format risk service Python files with Ruff"
dir = "apps/risk-service"
run = "mise run risk-service:format"

[tasks."risk-service:typecheck"]
description = "Run risk service BasedPyright"
dir = "apps/risk-service"
run = "mise run risk-service:typecheck"

[tasks."risk-service:check"]
description = "Run risk service lint, typecheck, and tests"
dir = "apps/risk-service"
run = "mise run risk-service:check"

[tasks."risk-service:openapi-schema"]
description = "Generate risk service OpenAPI schema"
dir = "apps/risk-service"
run = "mise run risk-service:openapi-schema"

[tasks."risk-service:openapi-client"]
description = "Generate risk service TypeScript OpenAPI client"
dir = "apps/risk-service"
run = "mise run risk-service:openapi-client"

[tasks."risk-service:api-typecheck"]
description = "Type-check the generated risk service API client"
run = "pnpm --filter @aequoros/risk-service-api run type-check"

[tasks."risk-service:api-fresh"]
description = "Regenerate and verify the risk service API client is fresh"
run = [
  "mise run risk-service:openapi-client",
  "mise run risk-service:api-typecheck",
  "test -z \"$(git status --porcelain -- apps/risk-service/openapi-schema.json packages/risk-service-api)\"",
]

[tasks."risk-service:migrate"]
description = "Run risk service Alembic migrations; requires DATABASE_URL"
dir = "apps/risk-service"
run = "mise run risk-service:migrate"

[tasks."risk-service:bootstrap-db"]
description = "Create risk service local DB roles, run migrations, and grant app privileges"
dir = "apps/risk-service"
run = "mise run risk-service:bootstrap-db"

[tasks."risk-service:revision"]
description = "Create risk service Alembic revision"
dir = "apps/risk-service"
usage = '''
arg "<message>" help="Revision message"
'''
run = 'mise run risk-service:revision "${usage_message?}"'

[tasks."risk-service:smoke"]
description = "Run risk service local smoke checks that do not require Postgres"
dir = "apps/risk-service"
run = [
  "uv sync",
  "uv run ruff check .",
  "uv run basedpyright",
  "uv run pytest",
]
