name: Claude PR Review

# Agent-as-reviewer, then GitHub-native auto-merge into main.
#
#   review job — always runs. Claude reviews the diff and submits a FORMAL PR
#   review (APPROVE / REQUEST_CHANGES) plus inline comments. Then, only when
#   every guardrail holds and Claude approved, it ENABLES GitHub native
#   auto-merge (`gh pr merge --auto --squash`). GitHub then merges the PR by
#   itself once the required status checks pass — no polling, correct timing.
#
# Guardrails (all must hold before auto-merge is enabled):
#   * repo variable AGENT_AUTOMERGE == 'on'  (ships OFF — first PRs review-only)
#   * PR author is not the automation itself  (an agent never merges its own
#     work — mirrors the product's maker-checker control)
#   * no protected path touched  (migrations, auth/RLS, LICENSE, .github, SECURITY)
#   * Claude's latest review state is APPROVED  (read from the reviews list, not
#     `reviewDecision`, which is null when no human reviewers are required)
#
# The hard merge gate is branch protection: the `gitleaks` secret-scan check is
# required, so nothing merges with a detectable secret even if a guardrail is
# mis-evaluated. Admins retain direct push for emergencies.
#
# Rollout: leave AGENT_AUTOMERGE=off, watch a few PRs get reviewed, confirm the
# approval-detection works on a live PR, then
#   gh variable set AGENT_AUTOMERGE -R CedynGroup/aequorOS --body on
# Note: this workflow only activates once it exists on the default branch.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request as a senior engineer for AequorOS, a
            multi-tenant treasury/ALM and Bank-of-Ghana regtech platform.
            Prioritise, in order: correctness bugs; tenant isolation (every new
            tenant table needs RLS enable/force + policy, every query filters
            organization_id); secret/credential handling (nothing hardcoded —
            must resolve to env); adherence to CODEBASE_CONVENTIONS.md and
            ARCHITECTURE.md (immutable calculation runs, value-based input_hash,
            adapter boundaries, design tokens — no raw hex). Post specific
            inline comments. Then submit a FORMAL pull-request review: APPROVE
            only if you found no correctness or security issue, otherwise
            REQUEST_CHANGES with a short rationale.
          claude_args: "--max-turns 25"

      - name: Enable auto-merge when approved and guardrails hold
        if: vars.AGENT_AUTOMERGE == 'on'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Guard 1 — author != merger. An agent never auto-merges its own PR.
          case "$AUTHOR" in
            *"[bot]"|claude|github-actions*)
              echo "::notice::PR authored by automation ($AUTHOR) — not enabling auto-merge."; exit 0 ;;
          esac

          # Guard 2 — protected paths always need a human.
          FILES=$(gh pr view "$PR" --repo "$REPO" --json files -q '.files[].path')
          if echo "$FILES" | grep -Eq '^backend/alembic/|/db/session\.py$|/api/deps\.py$|_rls|LICENSE|SECURITY\.md|^\.github/'; then
            echo "::notice::PR touches a protected path — leaving for human merge."; exit 0
          fi

          # Guard 3 — Claude's latest review must be APPROVED, none requesting changes.
          # (Read the reviews list by state, NOT reviewDecision — that field is
          #  null when the branch requires no human reviewers.)
          STATES=$(gh pr view "$PR" --repo "$REPO" --json reviews -q '.reviews[].state')
          if echo "$STATES" | grep -q 'CHANGES_REQUESTED'; then
            echo "::notice::A review requests changes — not enabling auto-merge."; exit 0
          fi
          if ! echo "$STATES" | grep -q 'APPROVED'; then
            echo "::notice::No APPROVED review yet — not enabling auto-merge."; exit 0
          fi

          # All guardrails pass — hand off to GitHub native auto-merge. GitHub
          # completes the squash-merge once the required checks are green.
          echo "Guardrails passed — enabling auto-merge for PR #$PR."
          gh pr merge "$PR" --repo "$REPO" --auto --squash --delete-branch
