name: Claude PR Review

# Agent-as-reviewer for pull requests into main. Two jobs:
#   review    — always runs; Claude reviews the diff and submits a formal
#               PR review (APPROVE / REQUEST_CHANGES) plus inline comments.
#   automerge — gated OFF by default (repo variable AGENT_AUTOMERGE != 'on').
#               When enabled it squash-merges ONLY when every guardrail holds:
#                 * the PR author is not the automation itself (author != merger —
#                   an agent must never merge its own work; mirrors the product's
#                   maker-checker control),
#                 * Claude's latest review is APPROVED,
#                 * every completed status check is green (no failures/pending),
#                 * no protected path is touched (migrations, auth/RLS, LICENSE,
#                   workflows, security policy) — those always need a human.
#
# Rollout: leave AGENT_AUTOMERGE=off, watch a few PRs get reviewed, then
#   `gh variable set AGENT_AUTOMERGE -R CedynGroup/aequorOS --body on`.
# Note: this workflow only becomes active once it exists on the default branch.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request as a senior engineer for AequorOS, a
            multi-tenant treasury/ALM and Bank-of-Ghana regtech platform.
            Prioritise, in order: correctness bugs; tenant isolation (every
            new tenant table needs RLS enable/force + policy, every query
            filters organization_id); secret/credential handling (nothing
            hardcoded — must resolve to env); adherence to CODEBASE_CONVENTIONS.md
            and ARCHITECTURE.md (immutable calculation runs, value-based
            input_hash, adapter boundaries, design tokens — no raw hex).
            Post specific inline comments. Then submit a formal PR review:
            APPROVE only if you found no correctness or security issue,
            otherwise REQUEST_CHANGES with a short rationale.
          claude_args: "--max-turns 25"

  automerge:
    needs: review
    if: vars.AGENT_AUTOMERGE == 'on' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate guardrails and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Guard 1 — author != merger. An agent never merges its own PR.
          case "$AUTHOR" in
            *"[bot]"|claude|github-actions*)
              echo "::notice::PR authored by automation ($AUTHOR) — refusing to self-merge."; exit 0 ;;
          esac

          # Guard 2 — protected paths always need a human.
          FILES=$(gh pr view "$PR" --repo "$REPO" --json files -q '.files[].path')
          if echo "$FILES" | grep -Eq '^backend/alembic/|(^|/)(auth|deps|session)\.py$|/db/session\.py$|_rls|LICENSE|SECURITY\.md|^\.github/'; then
            echo "::notice::PR touches a protected path — leaving for human review."; exit 0
          fi

          # Guard 3 — Claude's latest review must be APPROVED.
          DECISION=$(gh pr view "$PR" --repo "$REPO" --json reviewDecision -q '.reviewDecision')
          if [ "$DECISION" != "APPROVED" ]; then
            echo "::notice::reviewDecision=$DECISION (not APPROVED) — not merging."; exit 0
          fi

          # Guard 4 — every completed check green, none failing or pending.
          BAD=$(gh pr checks "$PR" --repo "$REPO" --json state -q \
            '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED" and .state != "NEUTRAL")] | length')
          if [ "$BAD" != "0" ]; then
            echo "::notice::$BAD check(s) not green — not merging."; exit 0
          fi

          echo "All guardrails passed — squash-merging PR #$PR."
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
