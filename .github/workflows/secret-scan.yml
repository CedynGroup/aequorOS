name: secret-scan

# Runs the free gitleaks BINARY directly. The gitleaks-action wrapper requires a
# paid license on organization repos; the CLI does not. Job name stays "gitleaks"
# so it keeps satisfying the required branch-protection check.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          TAG=$(curl -sSf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')
          VER=${TAG#v}
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${TAG}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan working tree
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --redact -v
